{% extends 'base.html' %}

{% block content %}

{% load crispy_forms_tags %}


<div class="container mt-5 p-3 shadow rounded" style="max-width: 600px;" >
<h2 class="text-center">Compose an Email</h2>

<form action="{% url 'send_emails' %}" enctype="multipart/form-data" method="POST">
    {% csrf_token %}
    <div class="form-group">
        {{form | crispy }}

    </div>

    <div class="form-group">
        <input type="submit" value="Send"  class="btn btn-primary">
    </div>
    {% include 'alerts.html' %}
</form>

</div>



{% endblock %}
