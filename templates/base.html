{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automate boring stuff with Django </title>
    <!-- Bootstrap 5 -->
    <!-- Latest compiled and minified CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">


<!-- Latest compiled JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>


<!-- ckeditor js -->
 <script type="text/javascript" src="{% static 'ckeditor/ckeditor-init.js' %}"></script>
<script type="text/javascript" src="{% static 'ckeditor/ckeditor/ckeditor.js' %}"></script>

<!-- jquery CDN -->
 <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>


<style>
.form-group{
    padding:15px !important;
}
.home-info{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    padding: 20px;
}
</style>
<script src="{% static 'js/custom.js' %}"></script>

</head>
<body>
    <nav class="navbar navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">Automate with Django</a>
    {% if user.is_authenticated %}

    <div>
        Logged in as: <b>{{user}}</b>
        &nbsp;<a href="{% url 'logout' %}" class="float-right btn btn-outline-danger">Logout</a>

    </div>
    {% else %}
    <div>
        <a href="{% url 'login' %}" class="float-right text-decoration-none text-dark">Login</a>
        &nbsp;<a href="{% url 'register' %}" class="float-right btn btn-success">Register</a>
    </div>
    {% endif %}
  </div>
</nav>
  
     {% block content %}

  <!-- the content willgo here -->


     {% endblock %}

</body>
</html>
