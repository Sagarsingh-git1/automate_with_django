
    {% extends 'base.html' %}
    {% block content %}
    <div class="container mt-5 alert-success shadow" style="max-width:600px;padding:50px;border-radius:10px;">
        <h3 class="text-center">Export Data to Database Tables</h3>
        <form action="{% url 'export_data' %}" method="POST" style="max-width: 600px;margin: auto;padding-top: 50px;">
            {% csrf_token %}
            <div class="form-group">
                <label for="model_name">Select the Database Table</label>
                <select name="model_name" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    {% for model in models %}
                    <option value="{{model}}" >{{model}}</option>
                    {% endfor %}

                </select>
                
            </div>
            <div class="form-group">
                <input type="submit" value="Export data" class="btn btn-success">
            </div>
            {% include 'alerts.html' %}
        </form>
        
    </div>


{% endblock %}
